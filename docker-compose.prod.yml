# ============================================
# Docker Compose Production - Sistema de Contas
# ============================================
# Uso: docker stack deploy -c docker-compose.prod.yml contas
# Este arquivo é dedicado à implantação em Docker Swarm com Traefik proxy.

version: '3.8'

services:
  app:
    image: angelomoreirafilho/gestao-contas:${IMAGE_TAG:-latest}
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - APP_URL=${APP_URL}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - SUPABASE_SERVICE_ROLE_KEY_FILE=/run/secrets/supabase_service_role_key
      - AWS_ACCESS_KEY_ID_FILE=/run/secrets/aws_access_key_id
      - AWS_SECRET_ACCESS_KEY_FILE=/run/secrets/aws_secret_access_key
    secrets:
      - supabase_service_role_key
      - aws_access_key_id
      - aws_secret_access_key
    networks:
      - BrancaNet
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 30s
        max_failure_ratio: 0.3
      rollback_config:
        parallelism: 1
        delay: 5s
      resources:
        limits:
          cpus: '1.5'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      placement:
        constraints:
          - node.role == worker
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.contas_app.rule=Host(`contas.brancaautoescola.com.br`)"
        - "traefik.http.routers.contas_app.entrypoints=websecure"
        - "traefik.http.routers.contas_app.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.contas_app.loadbalancer.server.port=3000"
        - "traefik.docker.network=BrancaNet"
      healthcheck:
        test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
        interval: 30s
        timeout: 10s
        retries: 3
        start_period: 40s

networks:
  BrancaNet:
    external: true

secrets:
  supabase_service_role_key:
    file: ./secrets/supabase_service_role_key.txt
  aws_access_key_id:
    file: ./secrets/aws_access_key_id.txt
  aws_secret_access_key:
    file: ./secrets/aws_secret_access_key.txt
