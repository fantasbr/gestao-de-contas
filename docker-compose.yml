# ============================================
# Docker Compose Local - Sistema de Contas a Pagar
# ============================================
# Uso: docker compose up -d
# Este arquivo é destinado exclusivamente ao ambiente de DESENVOLVIMENTO local.

version: "3.8"

services:
  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
        NEXT_PUBLIC_APP_URL: ${APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - APP_URL=${APP_URL:-http://localhost:3000}
    volumes:
      - contas_data_local:/app/data

volumes:
  contas_data_local:
    name: contas_local_data
